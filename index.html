<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>迷図的博客 · 首页</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="main">
    <div class="home-grid">
      <!-- 左侧：个人信息 -->
      <section class="profile-left">
        <h1 class="profile-name">迷図</h1>
        <p class="profile-bio">用代码记录思考，用作品沉淀成长。</p>
        <div class="profile-tags">
          <span class="tag accent">前端</span>
          <span class="tag green">学习者</span>
          <span class="tag">设计爱好者</span>
        </div>
        <div class="socials">
          <a href="#" title="GitHub">🐙</a>
          <a href="#" title="邮箱">✉️</a>
          <a href="#" title="Twitter">🐦</a>
          <a href="#" title="微博">📮</a>
        </div>

        <!-- 日历 -->
        <div class="calendar">
          <div class="cal-head">
            <h3 id="calTitle">2025 年 2 月</h3>
            <div class="nav-btns">
              <button id="calPrev">‹</button>
              <button id="calNext">›</button>
            </div>
          </div>
          <div class="cal-grid" id="calGrid"></div>
          <div class="cal-legend">
            <span><i></i> 有记录的日期</span>
            <span>点击可查看当天内容</span>
          </div>
        </div>
      </section>

      <!-- 右侧：头像 -->
      <section class="avatar-box">
        <div class="avatar">👨‍💻</div>
      </section>
    </div>

    <!-- 近期动态 -->
    <section style="margin-top: 20px;">
      <h2 class="section-title">✨ 近期动态</h2>
      <div class="feed" id="feed"></div>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // 首页专属初始化
    document.addEventListener("DOMContentLoaded", function () {
      renderFeed(document.getElementById("feed"), FEED_ITEMS);
      renderCalendar(
        document.getElementById("calGrid"),
        document.getElementById("calTitle"),
        RECORD_DAYS,
        { y: 2025, m: 1, d: 18 }
      );
    });
  </script>
</body>
</html>
